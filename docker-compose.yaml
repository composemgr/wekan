# nginx proxy address - http://172.17.0.1:8093

name: wekan
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  wekan:
    image: ghcr.io/wekan/wekan:latest
    pull_policy: always
    container_name: wekan-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - wekan
    ports:
      - "172.17.0.1:8093:8080"
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_URL: mongodb://${DB_USER_NAME:-wekan}:${DB_USER_PASS:-changeme_db_password}@wekan-db:27017/${DB_CREATE_DATABASE_NAME:-wekan}
      ROOT_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:8093
      WITH_API: true
      MAIL_URL: smtp://${EMAIL_SERVER_HOST:-172.17.0.1}:${EMAIL_SERVER_PORT:-587}
      MAIL_FROM: ${EMAIL_SERVER_MAIL_FROM:-noreply@example.com}
    depends_on:
      wekan-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  wekan-db:
    image: mongo:latest
    pull_policy: always
    container_name: wekan-db
    restart: always
    logging: *default-logging
    networks:
      - wekan
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_INITDB_DATABASE: ${DB_CREATE_DATABASE_NAME:-wekan}
      MONGO_INITDB_ROOT_USERNAME: ${DB_ADMIN_NAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mongodb/wekan:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  wekan:
    name: wekan
    external: false
